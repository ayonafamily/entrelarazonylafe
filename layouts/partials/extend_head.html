<script>
    (function () {
        const fecha = new Date();
        const mes = fecha.getMonth() + 1;

        // Verano Austral: Diciembre (12) a Marzo (3)
        const esVerano = (mes === 12 || mes <= 3);
        const root = document.documentElement;

        if (esVerano) {
            // PALETA VERANO (Contraste Tierra/Oro)
            root.style.setProperty('--theme', '#161614', 'important');   /* Fondo más profundo y cálido */
            root.style.setProperty('--entry', '#1e1e1b', 'important');   /* Tarjetas sutilmente más claras */
            root.style.setProperty('--primary', '#ffcc66', 'important'); /* Oro vibrante para títulos */
            root.style.setProperty('--secondary', '#d1b894', 'important');
            root.style.setProperty('--content', '#f2ece4', 'important'); /* Texto crema, no gris */
        } else {
            // PALETA INVIERNO (Contraste Glaciar/Azul)
            root.style.setProperty('--theme', '#05070a', 'important');   /* Negro azulado muy oscuro */
            root.style.setProperty('--entry', '#0d1117', 'important');
            root.style.setProperty('--primary', '#5ccfe6', 'important'); /* Cian brillante */
            root.style.setProperty('--secondary', '#708090', 'important');
            root.style.setProperty('--content', '#e6edf3', 'important');
        }
    })();
</script>

<style>
    /* Aplicación forzosa para que PaperMod no los ignore */
    body.dark {
        background-color: var(--theme) !important;
        color: var(--content) !important;
    }

    .post-entry {
        background: var(--entry) !important;
    }

    .post-title,
    .post-title a,
    a {
        color: var(--primary) !important;
    }

    /* Esto cambia el color de la descripción corta en el home */
    .entry-content {
        color: var(--secondary) !important;
    }
/* ==============================
   Corrección navegación Prev / Next (PaperMod)
   ============================== */

.paginav {
    background: var(--entry) !important;
    border-top: 1px solid var(--secondary) !important;
}

.paginav a {
    color: var(--primary) !important;
}

.paginav a:hover {
    color: var(--content) !important;
}

/* Texto interno (por si PaperMod lo separa) */
.paginav .prev,
.paginav .next {
    color: var(--primary) !important;
}

</style>

    /* SOLUCIÓN HERO RESPONSIVE */
    .first-entry img,

        width: 100% !important;

        object-fit: cover !important;

        object-position: center !important;
